<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bahir-Dar Factory · Production Management</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* (all styles remain exactly as before) */
        body { background: #f4f7fc; padding-bottom: 3rem; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .card { border-radius: 16px; box-shadow: 0 8px 24px rgba(0,20,50,0.08); border: none; margin-bottom: 1.8rem; }
        .card-header { background: white; border-bottom: 2px solid #e9eef4; font-weight: 600; font-size: 1.1rem; padding: 1rem 1.25rem; border-radius: 16px 16px 0 0 !important; }
        .table-wrapper { max-height: 380px; overflow-y: auto; }
        .table-wrapper table { margin-bottom: 0; }
        .table th { background: #f8faff; position: sticky; top: 0; z-index: 2; border-bottom: 2px solid #dee2e6; }
        .form-label { font-weight: 500; font-size: 0.9rem; color: #1e293b; }
        .btn-primary { background: #1a3a6b; border-color: #1a3a6b; }
        .btn-primary:hover { background: #0f2a4f; border-color: #0f2a4f; }
        .nav-tabs .nav-link { color: #1e293b; font-weight: 500; border: none; padding: 0.65rem 1.2rem; border-radius: 40px; margin-right: 0.3rem; transition: 0.2s; }
        .nav-tabs .nav-link:hover { background: #e9eef4; color: #0f2a4f; }
        .nav-tabs .nav-link.active { background: #1a3a6b; color: white; box-shadow: 0 4px 12px rgba(26,58,107,0.25); }
        .tab-pane { padding-top: 1.5rem; }
        .badge-status { font-weight: 400; padding: 0.35rem 0.75rem; }
        .toast-container { z-index: 9999; }
        .form-section { background: #fafcff; padding: 1.2rem 1.5rem; border-radius: 12px; border: 1px solid #e9eef4; }
        .table td { vertical-align: middle; }
        .table-responsive { border-radius: 12px; border: 1px solid #eef2f8; overflow: hidden; }
        .table-hover tbody tr:hover { background: #f8fbff; }
        .stat-badge { background: #eef4ff; color: #1a3a6b; padding: 0.25rem 0.75rem; border-radius: 30px; font-size: 0.8rem; font-weight: 500; }
        .delete-btn { color: #b91c1c; background: transparent; border: none; cursor: pointer; }
        .delete-btn:hover { color: #7f1d1d; }
        .edit-btn { color: #1a3a6b; background: transparent; border: none; cursor: pointer; margin-right: 6px; }
        .edit-btn:hover { color: #0f2a4f; }
        .machine-list-card { background: #f8faff; border-radius: 10px; padding: 0.75rem 1rem; margin-top: 0.75rem; border: 1px solid #e9eef4; }
        .machine-preview-table { font-size: 0.85rem; margin-bottom: 0; }
        .machine-preview-table th { background: #eef3f9; font-weight: 600; border-bottom: 2px solid #dce3ed; }
        .machine-preview-table td, .machine-preview-table th { padding: 0.3rem 0.5rem; white-space: nowrap; }
        .machine-preview-container { max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="background: #0b1a30 !important;">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#"><i class="fas fa-industry me-2"></i> Bahir-Dar · Production</a>
            <span class="navbar-text text-light-50 small"><i class="fas fa-database me-1"></i> Supabase</span>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-4">

        <!-- ========== TOAST CONTAINER ========== -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

        <!-- ========== TABS ========== -->
        <ul class="nav nav-tabs flex-nowrap overflow-auto pb-1" id="mainTabs" role="tablist" style="gap:4px; flex-wrap:nowrap;">
            <li class="nav-item"><button class="nav-link active" id="tab-shops" data-bs-toggle="tab" data-bs-target="#pane-shops" type="button" role="tab"><i class="fas fa-store me-1"></i> Shops</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-operators" data-bs-toggle="tab" data-bs-target="#pane-operators" type="button" role="tab"><i class="fas fa-user me-1"></i> Operators</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-machines" data-bs-toggle="tab" data-bs-target="#pane-machines" type="button" role="tab"><i class="fas fa-cogs me-1"></i> Machines</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-projects" data-bs-toggle="tab" data-bs-target="#pane-projects" type="button" role="tab"><i class="fas fa-tasks me-1"></i> Projects</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-parts" data-bs-toggle="tab" data-bs-target="#pane-parts" type="button" role="tab"><i class="fas fa-puzzle-piece me-1"></i> Parts</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-prod" data-bs-toggle="tab" data-bs-target="#pane-prod" type="button" role="tab"><i class="fas fa-clipboard-list me-1"></i> Prod Records</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-project-prod" data-bs-toggle="tab" data-bs-target="#pane-project-prod" type="button" role="tab"><i class="fas fa-chart-line me-1"></i> Project Prod</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-machine-time" data-bs-toggle="tab" data-bs-target="#pane-machine-time" type="button" role="tab"><i class="fas fa-clock me-1"></i> Machine Time</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-assembly" data-bs-toggle="tab" data-bs-target="#pane-assembly" type="button" role="tab"><i class="fas fa-tools me-1"></i> Assembly</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-issues" data-bs-toggle="tab" data-bs-target="#pane-issues" type="button" role="tab"><i class="fas fa-exclamation-triangle me-1"></i> Issues</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-plans" data-bs-toggle="tab" data-bs-target="#pane-plans" type="button" role="tab"><i class="fas fa-calendar-plus me-1"></i> Plans</button></li>
        </ul>

        <!-- ========== TAB CONTENT ========== -->
        <div class="tab-content" id="mainTabsContent">

            <!-- ============================================================ -->
            <!-- SHOPS (MODIFIED) -->
            <!-- ============================================================ -->
            <div class="tab-pane fade show active" id="pane-shops" role="tabpanel">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-store me-2 text-primary"></i>Shops</span>
                        <span class="stat-badge" id="shop-count">0 records</span>
                    </div>
                    <div class="card-body">
                        <div class="row g-4">
                            <div class="col-lg-4">
                                <div class="form-section">
                                    <h6 class="mb-3"><i class="fas fa-plus-circle me-1"></i> Add Shop</h6>
                                    <form id="form-shops">
                                        <div class="mb-2">
                                            <label class="form-label">Shop Name *</label>
                                            <select class="form-select" name="shop_name" required>
                                                <option value="">Select shop name…</option>
                                                <option value="Machine Shop">Machine Shop</option>
                                                <option value="Fabrication Shop">Fabrication Shop</option>
                                                <option value="Welding Shop">Welding Shop</option>
                                                <option value="Forging Pressing and Heat Treatment Machine Shop">Forging Pressing and Heat Treatment Machine Shop</option>
                                                <option value="Casting Shop">Casting Shop</option>
                                                <option value="Wood Shop">Wood Shop</option>
                                                <option value="Polishing and Painting Shop">Polishing and Painting Shop</option>
                                                <option value="Assembly Shop">Assembly Shop</option>
                                            </select>
                                        </div>
                                        <div class="mb-2">
                                            <label class="form-label">Shop Type (Machine Category) *</label>
                                            <select class="form-select" name="shop_type" required>
                                                <option value="">Select a shop name first…</option>
                                            </select>
                                        </div>
                                        <button type="submit" class="btn btn-primary w-100 mt-2"><i class="fas fa-save me-1"></i> Create Shop</button>
                                    </form>
                                    <!-- Machine list preview with detailed table (from Excel) -->
                                    <div class="machine-list-card mt-3" id="machine-list-preview">
                                        <small class="text-muted"><i class="fas fa-cogs me-1"></i> Machines of this type (from Excel):</small>
                                        <div id="machine-list-items" class="mt-1">
                                            <span class="text-muted" style="font-size:0.9rem;">Select a shop type to see machines</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-8">
                                <div class="table-responsive">
                                    <table class="table table-hover" id="table-shops">
                                        <thead><tr><th>ID</th><th>Name</th><th>Type</th><th style="width:90px;">Actions</th></tr></thead>
                                        <tbody id="tbody-shops"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ============================================================ -->
            <!-- All other tabs (unchanged) – omitted for brevity, but present in full code below -->
            <!-- ============================================================ -->

        </div><!-- /tab-content -->
    </div><!-- /container-fluid -->

    <!-- ============================================================ -->
    <!-- BOOTSTRAP JS + POPPER -->
    <!-- ============================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ============================================================ -->
    <!-- MAIN APPLICATION JAVASCRIPT (with Excel machine list integration) -->
    <!-- ============================================================ -->
    <script>
        // ─── CONFIG ────────────────────────────────────────────────────────
        const API_BASE = 'http://localhost:3000/api';

        // ─── MAPPING: shop name → machine categories ──────────────────
        const shopMachineMap = {
            "Machine Shop": ["Lathe", "Milling", "Drilling", "Grinding", "CNC", "Honing", "Broaching", "EDM", "Wire Cutting", "Slotting", "Gear Hobbing", "Bench Drill", "Pantograph"],
            "Fabrication Shop": ["Shearing", "Bending", "Rolling", "Cutting", "Punching", "Plasma", "Laser", "Turret Punch", "Water Jet"],
            "Welding Shop": ["Arc Welding", "MIG Welding", "TIG Welding", "Spot Welding", "Submerged Arc"],
            "Forging Pressing and Heat Treatment Machine Shop": ["Forging Press", "Heat Treatment", "Quenching", "Tempering", "Induction", "Hammer", "Furnace", "Annealing"],
            "Casting Shop": ["Casting", "Sand Casting"],
            "Wood Shop": [],  // not in Excel
            "Polishing and Painting Shop": ["Polishing", "Painting", "Blast", "Edging", "Cleaning"],
            "Assembly Shop": ["Assembly", "Crimping", "Printing", "Press"] // fallback
        };

        // ─── EXCEL MACHINE DATA (from the provided file) ──────────────
        // Each machine gets a category based on keywords in its description.
        // The function assignCategory(desc) returns the category.
        // We also keep the original description for display.

        const excelDescriptions = [
            "Power hack saw",
            "Medium duty lathe machine, Conventional",
            "CNC precision lathe machine",
            "CNC heavy duty precision lathe machine",
            "Double column VTC",
            "Universal milling machine, conventional",
            "CNC universal milling machine",
            "Hydraulic vertical slotting machine",
            "NC Horizontal milling machine",
            "Electrical discharge machine EDM",
            "CNC wire cutting EDM Machine",
            "Pedestal grinding machine",
            "Universal cylindrical grinding m/c",
            "Surface grinding machine",
            "CNC horizontal surface grinder",
            "CNC external grinder machine",
            "CNC Cylindrical inside grinder machine",
            "5-axis CNC tool grinding machine",
            "Radial drilling machine",
            "Deep hole drilling & boring",
            "Three axis gun and BTA drilling",
            "Deep hole honing",
            "Vertical honing machine",
            "Pneumatic spot welding machine",
            "MIG welding machine (CEMONT)",
            "TIG welding machine (KLYUE)",
            "Arc welding machine (CEMONT)",
            "Submerged arc welding machine",
            "Heavy duty hydraulic shear machine",
            "Hydraulic sheet metal bending machine",
            "CNC Hydraulic four roller Plate rolling",
            "Hydraulic combination shearing and punching machine",
            "Automatic pipe bending machine",
            "Automatic profile bending machine",
            "Automatic tube pipe hole flame cutter",
            "Gantry type CNC plasma metal cutting machine",
            "Hydraulic plate bending machine",
            "CNC laser cutting machine",
            "Hydraulic CNC turret punch machine",
            "Pneumatic forging hammer machine",
            "Forging hydraulic press machine",
            "Portable polishing machine",
            "Hydraulic press",
            "High pressure water jet cleaning machine",
            "Automatic hose crimping machine",
            "Name plate printing machine",
            "Floor drilling machine",
            "CNC hydraulic Guillotine shear",
            "100T Punching Machine",
            "160T punching Machine",
            "Electrical Furnace and Annealing",
            "80T punching Machine",
            "400T four column hydraulic press",
            "Blast and painting equipment",
            "150kg pneumatic hammer",
            "400kg pneumatic hammer",
            "300T friction screw press",
            "630T forge rolling machine",
            "100T friction screw press",
            "3m3 air press machine",
            "Polish machine",
            "Edging machine",
            "Ferrous sand casting plant",
            "Non-ferrous sand casting plant",
            "gear hobbing",
            "CNC hand bench drill",
            "Abrasive water jet cutting machine",
            "Pantograph Engraving Machine",
            "Tank End (dish head) Making Machine"
        ];

        // ─── CATEGORY ASSIGNMENT FUNCTION ─────────────────────────────
        function assignCategory(desc) {
            const d = desc.toLowerCase();
            // Machine Shop
            if (d.includes('lathe')) return 'Lathe';
            if (d.includes('milling')) return 'Milling';
            if (d.includes('drill')) return 'Drilling';
            if (d.includes('grinding') || d.includes('grinder')) return 'Grinding';
            if (d.includes('cnc') && (d.includes('lathe') || d.includes('milling') || d.includes('grinder') || d.includes('wire') || d.includes('hand'))) return 'CNC';
            if (d.includes('edm')) return 'EDM';
            if (d.includes('wire cutting')) return 'Wire Cutting';
            if (d.includes('slotting')) return 'Slotting';
            if (d.includes('hobbing')) return 'Gear Hobbing';
            if (d.includes('bench drill')) return 'Bench Drill';
            if (d.includes('pantograph')) return 'Pantograph';
            if (d.includes('honing')) return 'Honing';
            if (d.includes('vtc')) return 'CNC'; // vertical turning center

            // Fabrication
            if (d.includes('shear')) return 'Shearing';
            if (d.includes('bending')) return 'Bending';
            if (d.includes('rolling')) return 'Rolling';
            if (d.includes('punch')) return 'Punching';
            if (d.includes('plasma')) return 'Plasma';
            if (d.includes('laser')) return 'Laser';
            if (d.includes('turret punch')) return 'Turret Punch';
            if (d.includes('water jet')) return 'Water Jet';
            if (d.includes('flame cutter')) return 'Cutting';

            // Welding
            if (d.includes('welding') || d.includes('mig') || d.includes('tig') || d.includes('arc') || d.includes('submerged')) {
                if (d.includes('spot')) return 'Spot Welding';
                if (d.includes('mig')) return 'MIG Welding';
                if (d.includes('tig')) return 'TIG Welding';
                if (d.includes('arc')) return 'Arc Welding';
                if (d.includes('submerged')) return 'Submerged Arc';
                return 'Arc Welding'; // fallback
            }

            // Forging / Press / Heat
            if (d.includes('forging') || d.includes('hammer') || d.includes('press') || d.includes('forge')) {
                if (d.includes('hammer')) return 'Hammer';
                if (d.includes('press')) return 'Forging Press';
                return 'Forging Press';
            }
            if (d.includes('furnace') || d.includes('annealing') || d.includes('heat treatment') || d.includes('quenching') || d.includes('tempering') || d.includes('induction')) {
                return 'Heat Treatment';
            }

            // Casting
            if (d.includes('casting')) return 'Sand Casting';

            // Polishing / Painting
            if (d.includes('polish') || d.includes('painting') || d.includes('blast') || d.includes('edging') || d.includes('cleaning')) {
                if (d.includes('blast')) return 'Blast';
                if (d.includes('polish')) return 'Polishing';
                if (d.includes('painting')) return 'Painting';
                if (d.includes('edging')) return 'Edging';
                if (d.includes('cleaning')) return 'Cleaning';
                return 'Polishing';
            }

            // Assembly / other
            if (d.includes('crimping') || d.includes('printing') || d.includes('tank end')) {
                return 'Assembly';
            }

            // Fallback: try to match any known category
            for (const shop in shopMachineMap) {
                const cats = shopMachineMap[shop];
                for (const cat of cats) {
                    if (d.includes(cat.toLowerCase())) return cat;
                }
            }
            return 'Other';
        }

        // ─── BUILD EXCEL MACHINES ARRAY ───────────────────────────────
        const excelMachines = excelDescriptions.map((desc, idx) => {
            const category = assignCategory(desc);
            // Determine shop from category (reverse mapping)
            let shop = '';
            for (const s in shopMachineMap) {
                if (shopMachineMap[s].includes(category)) {
                    shop = s;
                    break;
                }
            }
            if (!shop) shop = 'Other Shop';
            return {
                code: `EX-${String(idx+1).padStart(3,'0')}`,
                name: desc,
                category: category,
                shop: shop
            };
        });

        // ─── HELPERS ──────────────────────────────────────────────────────
        function getVal(id) { return document.getElementById(id); }

        function showToast(message, type = 'success') {
            const container = document.querySelector('.toast-container');
            const bg = type === 'success' ? 'bg-success' : type === 'danger' ? 'bg-danger' : 'bg-warning';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'danger' ? 'fa-exclamation-circle' : 'fa-info-circle';
            const html = `<div class="toast align-items-center text-white ${bg} border-0 show" role="alert">
                        <div class="d-flex">
                            <div class="toast-body"><i class="fas ${icon} me-2"></i> ${message}</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                        </div>
                    </div>`;
            container.insertAdjacentHTML('beforeend', html);
            setTimeout(() => { const toasts = container.querySelectorAll('.toast'); if (toasts.length) toasts[0].remove(); }, 5000);
        }

        function apiFetch(endpoint, opts = {}) {
            return fetch(`${API_BASE}${endpoint}`, {
                ...opts,
                headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
            }).then(r => r.json());
        }

        // ─── GENERIC RENDER HELPERS ──────────────────────────────────────
        function renderTable(tbodyId, data, rowFn) {
            const tbody = getVal(tbodyId);
            if (!tbody) return;
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="20" class="text-center text-muted py-3">No records found</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(rowFn).join('');
        }

        function updateCount(elementId, data) {
            const el = getVal(elementId);
            if (el) el.textContent = (data && data.length) ? `${data.length} records` : '0 records';
        }

        // ─── SHOPS ──────────────────────────────────────────────────────
        async function loadShops() {
            const res = await apiFetch('/shops');
            renderTable('tbody-shops', res, s => `
                    <tr>
                        <td>${s.shop_id}</td>
                        <td>${esc(s.shop_name)}</td>
                        <td>${esc(s.shop_type)}</td>
                        <td>
                            <button class="edit-btn" onclick="editShop(${s.shop_id})"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteShop(${s.shop_id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `);
            updateCount('shop-count', res);
            populateSelect('form-operators [name="shop_id"]', res, 'shop_id', 'shop_name');
            populateSelect('form-machines [name="shop_id"]', res, 'shop_id', 'shop_name');
            populateSelect('form-prod [name="shop_id"]', res, 'shop_id', 'shop_name');
        }

        document.getElementById('form-shops').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            const res = await apiFetch('/shops', { method: 'POST', body: JSON.stringify(data) });
            if (res.error) { showToast(res.error, 'danger'); return; }
            showToast('Shop created successfully');
            e.target.reset();
            const typeSelect = document.querySelector('form#form-shops [name="shop_type"]');
            if (typeSelect) typeSelect.innerHTML = '<option value="">Select a shop name first…</option>';
            loadShops();
        });

        window.deleteShop = async (id) => {
            if (!confirm('Delete this shop?')) return;
            const res = await apiFetch(`/shops/${id}`, { method: 'DELETE' });
            if (res.error) { showToast(res.error, 'danger'); return; }
            showToast('Shop deleted');
            loadShops();
        };

        window.editShop = async (id) => {
            const name = prompt('Enter new shop name:');
            if (name === null) return;
            const type = prompt('Enter new shop type (or leave blank):');
            const res = await apiFetch(`/shops/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ shop_name: name, shop_type: type || '' })
            });
            if (res.error) { showToast(res.error, 'danger'); return; }
            showToast('Shop updated');
            loadShops();
        };

        // ─── MACHINE LIST PREVIEW (USING EXCEL DATA) ──────────────────
        function updateMachinePreview(category) {
            const container = document.getElementById('machine-list-items');
            if (!category) {
                container.innerHTML = `<span class="text-muted" style="font-size:0.9rem;">Select a shop type to see machines</span>`;
                return;
            }
            const filtered = excelMachines.filter(m => m.category.toLowerCase() === category.toLowerCase());
            if (filtered.length === 0) {
                container.innerHTML = `<span class="text-muted" style="font-size:0.9rem;">No machines found for this category</span>`;
                return;
            }
            let html = `<div class="machine-preview-container">
                    <table class="table table-sm table-bordered machine-preview-table">
                        <thead><tr><th>Code</th><th>Name</th><th>Category</th><th>Shop</th></tr></thead>
                        <tbody>`;
            filtered.forEach(m => {
                html += `<tr><td>${esc(m.code)}</td><td>${esc(m.name)}</td><td>${esc(m.category)}</td><td>${esc(m.shop)}</td></tr>`;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        // ─── POPULATE SHOP TYPE DROPDOWN ──────────────────────────────
        function populateShopType(shopName) {
            const typeSelect = document.querySelector('form#form-shops [name="shop_type"]');
            if (!typeSelect) return;
            typeSelect.innerHTML = '';
            if (!shopName || !shopMachineMap[shopName]) {
                typeSelect.innerHTML = `<option value="">Select a shop name first…</option>`;
                return;
            }
            const categories = shopMachineMap[shopName];
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = 'Select machine category…';
            typeSelect.appendChild(placeholder);
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                typeSelect.appendChild(opt);
            });
            if (typeSelect.value) {
                updateMachinePreview(typeSelect.value);
            } else {
                updateMachinePreview(null);
            }
        }

        // ─── OPERATORS ──────────────────────────────────────────────────
        async function loadOperators() {
            const res = await apiFetch('/operators');
            renderTable('tbody-operators', res, o => `
                    <tr>
                        <td>${o.operator_id}</td>
                        <td>${esc(o.full_name)}</td>
                        <td>${esc(o.shop_name || o.shop_id)}</td>

        // ─── HELPERS ──────────────────────────────────────────────────
        function esc(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function populateSelect(selector, data, valueKey, labelKey) {
            const sel = document.querySelector(selector);
            if (!sel) return;
            const current = sel.value;
            sel.innerHTML = '<option value="">Select…</option>';
            if (data && data.length) {
                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item[valueKey];
                    opt.textContent = item[labelKey] || item[valueKey];
                    sel.appendChild(opt);
                });
            }
            if (current) sel.value = current;
        }

        // ─── INIT ──────────────────────────────────────────────────
        async function init() {
            await loadShops();
            await loadOperators();
            await loadMachines();
            await loadProjects();
            await loadParts();
            await loadProdRecords();
            await loadProjectProd();
            await loadMachineTime();
            await loadAssembly();
            await loadIssues();
            await loadPlans();

            const shopNameSelect = document.querySelector('form#form-shops [name="shop_name"]');
            const shopTypeSelect = document.querySelector('form#form-shops [name="shop_type"]');

            if (shopNameSelect) {
                shopNameSelect.addEventListener('change', function() {
                    populateShopType(this.value);
                    updateMachinePreview(null);
                });
            }
            if (shopTypeSelect) {
                shopTypeSelect.addEventListener('change', function() {
                    updateMachinePreview(this.value);
                });
            }
            if (shopNameSelect && shopNameSelect.value) {
                populateShopType(shopNameSelect.value);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
