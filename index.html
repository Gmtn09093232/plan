<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bahir-Dar Factory · Production Management</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* (all styles remain the same, except we add a small table style) */
        body {
            background: #f4f7fc;
            padding-bottom: 3rem;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 20, 50, 0.08);
            border: none;
            margin-bottom: 1.8rem;
        }
        .card-header {
            background: white;
            border-bottom: 2px solid #e9eef4;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 1.25rem;
            border-radius: 16px 16px 0 0 !important;
        }
        .table-wrapper {
            max-height: 380px;
            overflow-y: auto;
        }
        .table-wrapper table {
            margin-bottom: 0;
        }
        .table th {
            background: #f8faff;
            position: sticky;
            top: 0;
            z-index: 2;
            border-bottom: 2px solid #dee2e6;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e293b;
        }
        .btn-primary {
            background: #1a3a6b;
            border-color: #1a3a6b;
        }
        .btn-primary:hover {
            background: #0f2a4f;
            border-color: #0f2a4f;
        }
        .btn-outline-secondary {
            border-color: #d0d9e8;
        }
        .nav-tabs .nav-link {
            color: #1e293b;
            font-weight: 500;
            border: none;
            padding: 0.65rem 1.2rem;
            border-radius: 40px;
            margin-right: 0.3rem;
            transition: 0.2s;
        }
        .nav-tabs .nav-link:hover {
            background: #e9eef4;
            color: #0f2a4f;
        }
        .nav-tabs .nav-link.active {
            background: #1a3a6b;
            color: white;
            box-shadow: 0 4px 12px rgba(26, 58, 107, 0.25);
        }
        .tab-pane {
            padding-top: 1.5rem;
        }
        .badge-status {
            font-weight: 400;
            padding: 0.35rem 0.75rem;
        }
        .toast-container {
            z-index: 9999;
        }
        .form-section {
            background: #fafcff;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            border: 1px solid #e9eef4;
        }
        .table td {
            vertical-align: middle;
        }
        .action-btn {
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 2rem 0;
        }
        .table-responsive {
            border-radius: 12px;
            border: 1px solid #eef2f8;
            overflow: hidden;
        }
        .table-responsive table {
            margin-bottom: 0;
        }
        .table-hover tbody tr:hover {
            background: #f8fbff;
        }
        .stat-badge {
            background: #eef4ff;
            color: #1a3a6b;
            padding: 0.25rem 0.75rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .delete-btn {
            color: #b91c1c;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .delete-btn:hover {
            color: #7f1d1d;
        }
        .edit-btn {
            color: #1a3a6b;
            background: transparent;
            border: none;
            cursor: pointer;
            margin-right: 6px;
        }
        .edit-btn:hover {
            color: #0f2a4f;
        }
        /* machine preview table styles */
        .machine-list-card {
            background: #f8faff;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            border: 1px solid #e9eef4;
        }
        .machine-preview-table {
            font-size: 0.85rem;
            margin-bottom: 0;
        }
        .machine-preview-table th {
            background: #eef3f9;
            font-weight: 600;
            border-bottom: 2px solid #dce3ed;
        }
        .machine-preview-table td, .machine-preview-table th {
            padding: 0.3rem 0.5rem;
            white-space: nowrap;
        }
        .machine-preview-container {
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="background: #0b1a30 !important;">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#">
                <i class="fas fa-industry me-2"></i> Bahir-Dar · Production
            </a>
            <span class="navbar-text text-light-50 small">
                <i class="fas fa-database me-1"></i> Supabase
            </span>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-4">

        <!-- ========== TOAST CONTAINER ========== -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

        <!-- ========== TABS ========== -->
        <ul class="nav nav-tabs flex-nowrap overflow-auto pb-1" id="mainTabs" role="tablist" style="gap: 4px; flex-wrap: nowrap;">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-shops" data-bs-toggle="tab" data-bs-target="#pane-shops" type="button" role="tab">
                    <i class="fas fa-store me-1"></i> Shops
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-operators" data-bs-toggle="tab" data-bs-target="#pane-operators" type="button" role="tab">
                    <i class="fas fa-user me-1"></i> Operators
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-machines" data-bs-toggle="tab" data-bs-target="#pane-machines" type="button" role="tab">
                    <i class="fas fa-cogs me-1"></i> Machines
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-projects" data-bs-toggle="tab" data-bs-target="#pane-projects" type="button" role="tab">
                    <i class="fas fa-tasks me-1"></i> Projects
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-parts" data-bs-toggle="tab" data-bs-target="#pane-parts" type="button" role="tab">
                    <i class="fas fa-puzzle-piece me-1"></i> Parts
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-prod" data-bs-toggle="tab" data-bs-target="#pane-prod" type="button" role="tab">
                    <i class="fas fa-clipboard-list me-1"></i> Prod Records
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-project-prod" data-bs-toggle="tab" data-bs-target="#pane-project-prod" type="button" role="tab">
                    <i class="fas fa-chart-line me-1"></i> Project Prod
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-machine-time" data-bs-toggle="tab" data-bs-target="#pane-machine-time" type="button" role="tab">
                    <i class="fas fa-clock me-1"></i> Machine Time
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-assembly" data-bs-toggle="tab" data-bs-target="#pane-assembly" type="button" role="tab">
                    <i class="fas fa-tools me-1"></i> Assembly
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-issues" data-bs-toggle="tab" data-bs-target="#pane-issues" type="button" role="tab">
                    <i class="fas fa-exclamation-triangle me-1"></i> Issues
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-plans" data-bs-toggle="tab" data-bs-target="#pane-plans" type="button" role="tab">
                    <i class="fas fa-calendar-plus me-1"></i> Plans
                </button>
            </li>
        </ul>

        <!-- ========== TAB CONTENT ========== -->
        <div class="tab-content" id="mainTabsContent">

            <!-- ============================================================ -->
            <!-- SHOPS (MODIFIED) -->
            <!-- ============================================================ -->
            <div class="tab-pane fade show active" id="pane-shops" role="tabpanel">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-store me-2 text-primary"></i>Shops</span>
                        <span class="stat-badge" id="shop-count">0 records</span>
                    </div>
                    <div class="card-body">
                        <div class="row g-4">
                            <div class="col-lg-4">
                                <div class="form-section">
                                    <h6 class="mb-3"><i class="fas fa-plus-circle me-1"></i> Add Shop</h6>
                                    <form id="form-shops">
                                        <div class="mb-2">
                                            <label class="form-label">Shop Name *</label>
                                            <select class="form-select" name="shop_name" required>
                                                <option value="">Select shop name…</option>
                                                <option value="Machine Shop">Machine Shop</option>
                                                <option value="Fabrication Shop">Fabrication Shop</option>
                                                <option value="Welding Shop">Welding Shop</option>
                                                <option value="Forging Pressing and Heat Treatment Machine Shop">Forging Pressing and Heat Treatment Machine Shop</option>
                                                <option value="Casting Shop">Casting Shop</option>
                                                <option value="Wood Shop">Wood Shop</option>
                                                <option value="Polishing and Painting Shop">Polishing and Painting Shop</option>
                                                <option value="Assembly Shop">Assembly Shop</option>
                                            </select>
                                        </div>
                                        <div class="mb-2">
                                            <label class="form-label">Shop Type (Machine Category) *</label>
                                            <select class="form-select" name="shop_type" required>
                                                <option value="">Select a shop name first…</option>
                                            </select>
                                        </div>
                                        <button type="submit" class="btn btn-primary w-100 mt-2">
                                            <i class="fas fa-save me-1"></i> Create Shop
                                        </button>
                                    </form>
                                    <!-- Machine list preview with detailed table -->
                                    <div class="machine-list-card mt-3" id="machine-list-preview">
                                        <small class="text-muted"><i class="fas fa-cogs me-1"></i> Machines of this type:</small>
                                        <div id="machine-list-items" class="mt-1">
                                            <span class="text-muted" style="font-size:0.9rem;">Select a shop type to see machines</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-8">
                                <div class="table-responsive">
                                    <table class="table table-hover" id="table-shops">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Name</th>
                                                <th>Type</th>
                                                <th style="width:90px;">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tbody-shops"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ============================================================ -->
            <!-- All other tabs (OPERATORS, MACHINES, PROJECTS, PARTS, PROD RECORDS, PROJECT PROD, MACHINE TIME, ASSEMBLY, ISSUES, PLANS) -->
            <!-- are exactly as in your original code – I’ve omitted them here for brevity, but they remain unchanged. -->
            <!-- ============================================================ -->

        </div><!-- /tab-content -->
    </div><!-- /container-fluid -->

    <!-- ============================================================ -->
    <!-- BOOTSTRAP JS + POPPER -->
    <!-- ============================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- ============================================================ -->
    <!-- MAIN APPLICATION JAVASCRIPT (only changes in updateMachinePreview) -->
    <!-- ============================================================ -->
    <script>
        // ─── CONFIG ────────────────────────────────────────────────────────
        const API_BASE = 'http://localhost:3000/api';

        // ─── MAPPING: shop name → machine categories ──────────────────
        const shopMachineMap = {
            "Machine Shop": ["Lathe", "Milling", "Drilling", "Grinding", "CNC", "Honing", "Broaching"],
            "Fabrication Shop": ["Shearing", "Bending", "Rolling", "Cutting", "Welding", "Punching"],
            "Welding Shop": ["Arc Welding", "MIG Welding", "TIG Welding", "Spot Welding", "Submerged Arc"],
            "Forging Pressing and Heat Treatment Machine Shop": ["Forging Press", "Heat Treatment Furnace", "Quenching Tank", "Tempering Furnace", "Induction Heater"],
            "Casting Shop": ["Induction Furnace", "Molding Machine", "Core Shooter", "Shot Blast", "Pouring Ladle"],
            "Wood Shop": ["Table Saw", "Band Saw", "Planer", "Sander", "Router", "Jointer"],
            "Polishing and Painting Shop": ["Polishing Machine", "Spray Booth", "Oven", "Grinder", "Buffing Machine"],
            "Assembly Shop": ["Assembly Line", "Conveyor", "Workstations", "Pneumatic Tools", "Torque Wrench"]
        };

        // ─── HELPERS ──────────────────────────────────────────────────────
        function getVal(id) { return document.getElementById(id); }

        function showToast(message, type = 'success') {
            const container = document.querySelector('.toast-container');
            const bg = type === 'success' ? 'bg-success' : type === 'danger' ? 'bg-danger' : 'bg-warning';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'danger' ? 'fa-exclamation-circle' :
                'fa-info-circle';
            const html = `
                    <div class="toast align-items-center text-white ${bg} border-0 show" role="alert">
                        <div class="d-flex">
                            <div class="toast-body"><i class="fas ${icon} me-2"></i> ${message}</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                        </div>
                    </div>
                `;
            container.insertAdjacentHTML('beforeend', html);
            setTimeout(() => {
                const toasts = container.querySelectorAll('.toast');
                if (toasts.length) toasts[0].remove();
            }, 5000);
        }

        function apiFetch(endpoint, opts = {}) {
            return fetch(`${API_BASE}${endpoint}`, {
                ...opts,
                headers: {
                    'Content-Type': 'application/json',
                    ...(opts.headers || {}),
                },
            }).then(r => r.json());
        }

        // ─── GENERIC RENDER HELPERS ──────────────────────────────────────
        function renderTable(tbodyId, data, rowFn) {
            const tbody = getVal(tbodyId);
            if (!tbody) return;
            if (!data || data.length === 0) {
                tbody.innerHTML =
                    `<tr><td colspan="20" class="text-center text-muted py-3">No records found</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(rowFn).join('');
        }

        function updateCount(elementId, data) {
            const el = getVal(elementId);
            if (el) el.textContent = (data && data.length) ? `${data.length} records` : '0 records';
        }

        // ─── SHOPS ──────────────────────────────────────────────────────
        let allMachines = [];

        async function loadShops() {
            const res = await apiFetch('/shops');
            renderTable('tbody-shops', res, s => `
                    <tr>
                        <td>${s.shop_id}</td>
                        <td>${esc(s.shop_name)}</td>
                        <td>${esc(s.shop_type)}</td>
                        <td>
                            <button class="edit-btn" onclick="editShop(${s.shop_id})"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteShop(${s.shop_id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `);
            updateCount('shop-count', res);
            populateSelect('form-operators [name="shop_id"]', res, 'shop_id', 'shop_name');
            populateSelect('form-machines [name="shop_id"]', res, 'shop_id', 'shop_name');
            populateSelect('form-prod [name="shop_id"]', res, 'shop_id', 'shop_name');
        }

        document.getElementById('form-shops').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            const res = await apiFetch('/shops', { method: 'POST', body: JSON.stringify(data) });
            if (res.error) { showToast(res.error, 'danger'); return; }
            showToast('Shop created successfully');
            e.target.reset();
            const typeSelect = document.querySelector('form#form-shops [name="shop_type"]');
            if (typeSelect) {
                typeSelect.innerHTML = '<option value="">Select a shop name first…</option>';
            }
            loadShops();
        });

        window.deleteShop = async (id) => {
            if (!confirm('Delete this shop?')) return;
            const res = await apiFetch(`/shops/${id}`, { method: 'DELETE' });
            if (res.error) { showToast(res.error, 'danger'); return; }
            showToast('Shop deleted');
            loadShops();
        };

        window.editShop = async (id) => {
            const name = prompt('Enter new shop name:');
            if (name === null) return;
            const type = prompt('Enter new shop type (or leave blank):');
            const res = await apiFetch(`/shops/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ shop_name: name, shop_type: type || '' })
            });
            if (res.error) { showToast(res.error, 'danger'); return; }
            showToast('Shop updated');
            loadShops();
        };

        // ─── MACHINE LIST PREVIEW (ENHANCED WITH TABLE) ──────────────
        function updateMachinePreview(shopType) {
            const container = document.getElementById('machine-list-items');
            if (!shopType) {
                container.innerHTML = `<span class="text-muted" style="font-size:0.9rem;">Select a shop type to see machines</span>`;
                return;
            }
            // Filter machines by category (case-insensitive)
            const filtered = allMachines.filter(m => 
                m.category && m.category.toLowerCase() === shopType.toLowerCase()
            );
            if (filtered.length === 0) {
                container.innerHTML = `<span class="text-muted" style="font-size:0.9rem;">No machines found for this shop type</span>`;
                return;
            }
            // Build a table with detailed columns
            let html = `
                <div class="machine-preview-container">
                    <table class="table table-sm table-bordered machine-preview-table">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Shop</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            filtered.forEach(m => {
                html += `
                    <tr>
                        <td>${esc(m.machine_code)}</td>
                        <td>${esc(m.machine_name)}</td>
                        <td>${esc(m.category)}</td>
                        <td>${esc(m.shop_name || m.shop_id)}</td>
                    </tr>
                `;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        // ─── POPULATE SHOP TYPE DROPDOWN ──────────────────────────────
        function populateShopType(shopName) {
            const typeSelect = document.querySelector('form#form-shops [name="shop_type"]');
            if (!typeSelect) return;
            typeSelect.innerHTML = '';
            if (!shopName || !shopMachineMap[shopName]) {
                typeSelect.innerHTML = `<option value="">Select a shop name first…</option>`;
                return;
            }
            const machines = shopMachineMap[shopName];
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = 'Select machine category…';
            typeSelect.appendChild(placeholder);
            machines.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                typeSelect.appendChild(opt);
            });
            if (typeSelect.value) {
                updateMachinePreview(typeSelect.value);
            } else {
                updateMachinePreview(null);
            }
        }

        // ─── ALL OTHER LOAD FUNCTIONS (unchanged) ──────────────────────
        // (loadOperators, loadMachines, loadProjects, loadParts, loadProdRecords,
        //  loadProjectProd, loadMachineTime, loadAssembly, loadIssues, loadPlans)
        // … all remain exactly as in your original code.
        // (I’m omitting them here to keep the answer concise, but they are unchanged.)

        // ─── HELPERS ──────────────────────────────────────────────────
        function esc(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function populateSelect(selector, data, valueKey, labelKey) {
            const sel = document.querySelector(selector);
            if (!sel) return;
            const current = sel.value;
            sel.innerHTML = '<option value="">Select…</option>';
            if (data && data.length) {
                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item[valueKey];
                    opt.textContent = item[labelKey] || item[valueKey];
                    sel.appendChild(opt);
                });
            }
            if (current) sel.value = current;
        }

        // ─── INIT ──────────────────────────────────────────────────
        async function init() {
            await loadShops();
            await loadOperators();
            await loadMachines();
            await loadProjects();
            await loadParts();
            await loadProdRecords();
            await loadProjectProd();
            await loadMachineTime();
            await loadAssembly();
            await loadIssues();
            await loadPlans();

            const shopNameSelect = document.querySelector('form#form-shops [name="shop_name"]');
            const shopTypeSelect = document.querySelector('form#form-shops [name="shop_type"]');

            if (shopNameSelect) {
                shopNameSelect.addEventListener('change', function() {
                    populateShopType(this.value);
                    updateMachinePreview(null);
                });
            }
            if (shopTypeSelect) {
                shopTypeSelect.addEventListener('change', function() {
                    updateMachinePreview(this.value);
                });
            }
            if (shopNameSelect && shopNameSelect.value) {
                populateShopType(shopNameSelect.value);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
